version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  exclusions:
    paths:
      - ".*_test\\.go$"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - ".*_test\\.go$"
